set -g mouse on
set -g base-index 1
set -g pane-base-index 1

# True color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"

# Prefix — stock C-b (default) on the kali box, to differentiate from host C-a

# Splits — stay in current dir, unbind defaults
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation (deliberate)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt+arrow pane navigation (no prefix — fast reactive switching)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Easy config reload
bind r source-file ~/.tmux.conf

# Synchronize panes (send keystrokes to all panes at once)
bind S setw synchronize-panes

set -g renumber-windows on          # close gap when window killed
set -sg escape-time 0               # faster key response (good for vim)
set -g history-limit 50000          # bigger scrollback buffer
setw -g mode-keys vi                # vi keys in copy mode
setw -g aggressive-resize on        # don't constrain to smallest attached client
set-option -g allow-rename off      # preserve window names (listener/shell/enum)

# Copy mode — yank to system clipboard
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"

# ── Status bar (evil twin: top, red/orange, LAN + tun0, no clock) ─────────────────────────────────────────────────
set -g status-position top
set -g status-style "bg=#181616,fg=#c5c9c5"
set -g status-interval 5

set -g status-left " #[fg=#e82424,bold] #S#[fg=#54546d,nobold] │ "
set -g status-left-length 30

set -g status-right "#[fg=#54546d]│ #[fg=#ffa066] #(hostname -I | awk '{print $1}') #[fg=#54546d]│ #[fg=#c34043] #(ip -4 -o addr show tun0 2>/dev/null | awk '{print $4}' | cut -d/ -f1 | grep . || echo ✗) "
set -g status-right-length 50

set -g window-status-format         "#[fg=#727169] #I:#W "
set -g window-status-current-format "#[fg=#ff9e3b,bold] #I:#W "
set -g window-status-separator      ""

set -g pane-border-style        "fg=#54546d"
set -g pane-active-border-style "fg=#c34043"
